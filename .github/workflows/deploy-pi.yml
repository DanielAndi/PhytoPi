name: Deploy to Pi

on:
  push:
    branches:
      - main
      - release/v*
    paths:
      # Trigger only when Pi-relevant code changes
      - 'User_Interface/**'
      - 'PhytoPI_Controler/**'
      - 'docker-compose.rpi.yml'
      - 'docker/**'
      - 'scripts/**'
      - '.github/workflows/deploy-pi.yml'
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Update PhytoPi
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Wait for Pi to be reachable
        run: |
          echo "Waiting for phytopi to appear on Tailscale..."
          for i in $(seq 1 12); do
            if tailscale ping --c 1 phytopi > /dev/null 2>&1; then
              echo "Pi reachable."
              break
            fi
            echo "Attempt $i/12 – retrying in 5s..."
            sleep 5
          done

      - name: Run update script on Pi via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: phytopi        # Tailscale MagicDNS hostname
          username: phytopi
          key: ${{ secrets.PI_SSH_PRIVATE_KEY }}
          script_stop: true
          # Run the update script; it git-pulls, detects what changed, rebuilds selectively
          script: |
            cd /home/phytopi/PhytoPi
            bash scripts/update.sh

      - name: Report result
        if: always()
        run: echo "Deploy step finished with status ${{ job.status }}"
